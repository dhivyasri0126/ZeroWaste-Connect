spring.application.name=zerowaste

# Server Configuration
server.port=${PORT:8081}

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/zerowaste_connect}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}

# Connection Pooling (HikariCP - optimized for Neon PostgreSQL)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Security Configuration
spring.security.user.name=${SECURITY_USER_NAME:Admin}
spring.security.user.password=${SECURITY_USER_PASSWORD:admin@123}

# Logging Configuration
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
server.error.include-message=always
server.error.include-binding-errors=always

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:zerowasteconnect.project@gmail.com}
spring.mail.password=${MAIL_PASSWORD:awjqdaaqtafllonu}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# CORS Configuration
cors.allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}

# JWT Configuration
jwt.secret=${JWT_SECRET:ThisIsMySecretKeyForZeroWasteConnectProject123456}
jwt.expiration=${JWT_EXPIRATION:86400000}